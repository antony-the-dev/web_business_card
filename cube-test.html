<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Cube Test</title>
    <style>
        body {
            margin: 0;
            background: #ffffff;
            overflow: hidden;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 6;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // lights for the glassy gradient
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const key = new THREE.DirectionalLight(0xffffff, 0.8);
        key.position.set(2, 3, 5);
        scene.add(key);
        const rim = new THREE.DirectionalLight(0x90a8c0, 0.5);
        rim.position.set(-3, -2, -4);
        scene.add(rim);

        const group = new THREE.Group();
        scene.add(group);

        // ===== NESTED CUBES: several boxes of growing size, stacked concentrically =====
        const LAYERS = 6;
        const cubes = [];
        for (let i = 0; i < LAYERS; i++) {
            const size = 0.7 + i * 0.55;     // each layer bigger -> tunnel effect
            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshStandardMaterial({
                color: 0x46566e,
                metalness: 0.15,
                roughness: 0.3,
                transparent: true,
                opacity: 0.18,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const cube = new THREE.Mesh(geo, mat);
            // each layer spins at a slightly different rate -> hypnotic depth
            cube.userData.rate = 0.0015 + i * 0.0008;
            cube.userData.phase = i * 0.6;
            group.add(cube);
            cubes.push(cube);
        }

        let t = 0;
        function animate() {
            requestAnimationFrame(animate);
            t += 0.01;

            cubes.forEach((c, i) => {
                // rotate each layer
                c.rotation.x += c.userData.rate;
                c.rotation.y += c.userData.rate * 1.3;
                // gentle pulse outward from center, phased per layer
                const pulse = 1 + Math.sin(t + c.userData.phase) * 0.06;
                c.scale.set(pulse, pulse, pulse);
            });

            // whole cluster turns slowly
            group.rotation.y += 0.002;
            group.rotation.x += 0.0009;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

</body>

</html>
