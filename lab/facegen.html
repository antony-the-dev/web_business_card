<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>facegen v3 — photo to ink stipple</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: #0a2540;
            color: #e8ecf1;
            display: flex;
            min-height: 100vh;
        }

        #controls {
            width: 320px;
            padding: 1.5rem;
            background: #071a30;
            overflow-y: auto;
            flex-shrink: 0;
        }

        h1 { font-size: 1rem; letter-spacing: 0.08em; margin-bottom: 1.2rem; color: #14b8c4; }

        .ctl { margin-bottom: 1rem; }

        .ctl label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            letter-spacing: 0.04em;
            color: #9fb3c8;
            margin-bottom: 0.3rem;
        }

        .ctl label output { color: #14b8c4; font-variant-numeric: tabular-nums; }

        .ctl input[type="range"] { width: 100%; accent-color: #14b8c4; }

        .hint { font-size: 0.7rem; color: #5c7186; line-height: 1.5; margin: 0.2rem 0 1rem; }

        button, .filebtn {
            display: block;
            width: 100%;
            padding: 0.6rem;
            margin-bottom: 0.6rem;
            background: transparent;
            border: 1px solid #14b8c4;
            border-radius: 6px;
            color: #14b8c4;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            text-align: center;
        }

        button:hover, .filebtn:hover { background: rgba(20, 184, 196, 0.12); }

        button.primary { background: #14b8c4; color: #071a30; font-weight: 600; }

        #stats { font-size: 0.72rem; color: #9fb3c8; margin-top: 0.8rem; line-height: 1.6; }

        #stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.5rem;
        }

        .panes { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; }

        .pane { text-align: center; }

        .pane p { font-size: 0.7rem; letter-spacing: 0.08em; color: #5c7186; margin-bottom: 0.5rem; }

        canvas { background: #071a30; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; }

        input[type="file"] { display: none; }
    </style>
</head>

<body>
    <div id="controls">
        <h1>FACEGEN v3</h1>

        <label class="filebtn" for="file">Load photo</label>
        <input type="file" id="file" accept="image/*">

        <p class="hint">v3 samples DARK pixels — dots land on hair, brows, eyes, beard, like an ink stipple portrait.
            The preview below is the site's exact palette: what you see here is what the lab shows.</p>

        <div class="ctl">
            <label>Crop X <output id="o-cx">50</output>%</label>
            <input type="range" id="cx" min="0" max="100" value="50">
        </div>
        <div class="ctl">
            <label>Crop Y <output id="o-cy">45</output>%</label>
            <input type="range" id="cy" min="0" max="100" value="45">
        </div>
        <div class="ctl">
            <label>Crop size <output id="o-cs">80</output>%</label>
            <input type="range" id="cs" min="20" max="100" value="80">
        </div>
        <div class="ctl">
            <label>Points <output id="o-n">3200</output></label>
            <input type="range" id="n" min="800" max="8000" step="100" value="3200">
        </div>
        <div class="ctl">
            <label>Background cut <output id="o-bg">0.10</output></label>
            <input type="range" id="bg" min="0" max="0.4" step="0.01" value="0.10">
        </div>
        <div class="ctl">
            <label>Highlight cut <output id="o-hi">0.97</output></label>
            <input type="range" id="hi" min="0.5" max="1" step="0.01" value="0.97">
        </div>
        <div class="ctl">
            <label>Contrast (gamma) <output id="o-g">1.6</output></label>
            <input type="range" id="g" min="0.4" max="4" step="0.1" value="1.6">
        </div>
        <div class="ctl">
            <label>Depth relief <output id="o-d">0.55</output></label>
            <input type="range" id="d" min="0" max="1.5" step="0.05" value="0.55">
        </div>

        <button class="primary" id="export">Export face-points.js</button>
        <div id="stats">No photo loaded.</div>
    </div>

    <div id="stage">
        <div class="panes">
            <div class="pane">
                <p>SOURCE + CROP</p>
                <canvas id="src" width="420" height="420"></canvas>
            </div>
            <div class="pane">
                <p>POINT CLOUD PREVIEW</p>
                <canvas id="out" width="420" height="420"></canvas>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const fileInput = document.getElementById("file");
            const srcCv = document.getElementById("src"), srcCtx = srcCv.getContext("2d");
            const outCv = document.getElementById("out"), outCtx = outCv.getContext("2d");
            const stats = document.getElementById("stats");

            // working buffer: photo downscaled for fast pixel reads
            const WORK = 640;
            const work = document.createElement("canvas");
            work.width = WORK; work.height = WORK;
            const workCtx = work.getContext("2d", { willReadFrequently: true });

            let img = null;
            let points = null;   // Float32Array [x,y,z, ...] scene units
            let bright = null;   // Float32Array [b, ...] 0..1 per point

            const ctl = {};
            ["cx", "cy", "cs", "n", "bg", "hi", "g", "d"].forEach(id => {
                ctl[id] = document.getElementById(id);
                ctl[id].addEventListener("input", () => {
                    document.getElementById("o-" + id).textContent = ctl[id].value;
                    render();
                });
            });

            fileInput.addEventListener("change", (e) => {
                const f = e.target.files[0];
                if (!f) return;
                const url = URL.createObjectURL(f);
                img = new Image();
                img.onload = () => { URL.revokeObjectURL(url); render(); };
                img.src = url;
            });

            function cropRect() {
                const side = Math.min(img.width, img.height) * (ctl.cs.value / 100);
                const x = (img.width - side) * (ctl.cx.value / 100);
                const y = (img.height - side) * (ctl.cy.value / 100);
                return { x, y, side };
            }

            function render() {
                if (!img) return;
                const c = cropRect();

                const s = srcCv.width / Math.max(img.width, img.height);
                srcCtx.clearRect(0, 0, srcCv.width, srcCv.height);
                srcCtx.globalAlpha = 0.35;
                srcCtx.drawImage(img, 0, 0, img.width * s, img.height * s);
                srcCtx.globalAlpha = 1;
                srcCtx.drawImage(img, c.x, c.y, c.side, c.side,
                    c.x * s, c.y * s, c.side * s, c.side * s);
                srcCtx.strokeStyle = "#14b8c4";
                srcCtx.strokeRect(c.x * s, c.y * s, c.side * s, c.side * s);

                samplePoints(c);
                drawPreview();
            }

            function samplePoints(c) {
                workCtx.drawImage(img, c.x, c.y, c.side, c.side, 0, 0, WORK, WORK);
                const data = workCtx.getImageData(0, 0, WORK, WORK).data;

                const target = +ctl.n.value;
                const bgCut = +ctl.bg.value;   // pixels darker than this = photo background, rejected
                const hiCut = +ctl.hi.value;   // pixels brighter than this = blown highlights, rejected
                const gamma = +ctl.g.value;
                const depth = +ctl.d.value;

                const accP = [], accB = [];
                const maxAttempts = target * 40;
                for (let i = 0; i < maxAttempts && accB.length < target; i++) {
                    const px = Math.random() * WORK, py = Math.random() * WORK;
                    const idx = ((py | 0) * WORK + (px | 0)) * 4;
                    const b = (data[idx] * 0.299 + data[idx + 1] * 0.587 + data[idx + 2] * 0.114) / 255;
                    if (b <= bgCut || b >= hiCut) continue;
                    // ink weight: DARKER pixel -> stronger dot (stipple logic for a light background)
                    const w = Math.pow(1 - (b - bgCut) / (hiCut - bgCut), gamma);
                    if (Math.random() > w) continue;
                    const x = (px / WORK - 0.5) * 2.2;
                    const y = -(py / WORK - 0.5) * 2.2;
                    const z = (w - 0.5) * depth;
                    accP.push(x, y, z);
                    accB.push(w); // exported as FACE_BRIGHTNESS = dot strength, the lab shades by it as-is
                    
                }
                points = new Float32Array(accP);
                bright = new Float32Array(accB);
                stats.innerHTML = "Points: <b>" + bright.length + "</b> / " + target +
                    (bright.length < target ? "<br>Budget not reached — lower Background cut or Contrast." : "") +
                    "<br>Crop: " + Math.round(c.side) + "px square";
            }

            function drawPreview() {
                // exact site palette: hero band background + ink dots
                outCtx.fillStyle = "#dbe7fb";
                outCtx.fillRect(0, 0, outCv.width, outCv.height);
                if (!points) return;
                const half = outCv.width / 2;
                for (let i = 0, k = 0; i < points.length; i += 3, k++) {
                    const x = half + points[i] / 1.1 * half * 0.9;
                    const y = half - points[i + 1] / 1.1 * half * 0.9;
                    const w = bright[k];
                    outCtx.fillStyle = "rgba(10,37,64," + (0.3 + 0.7 * w).toFixed(2) + ")";
                    const r = 0.9 + w * 1.6;
                    outCtx.beginPath();
                    outCtx.arc(x, y, r, 0, Math.PI * 2);
                    outCtx.fill();
                }
            }

            document.getElementById("export").addEventListener("click", () => {
                if (!points || !points.length) { alert("Load a photo first."); return; }
                const rp = Array.from(points, v => +v.toFixed(3));
                const rb = Array.from(bright, v => +v.toFixed(3));
                const js = "// Generated by facegen v3 (ink-stipple weights) — do not edit by hand.\n" +
                    "// " + bright.length + " points. FACE_POINTS = [x,y,z,...], FACE_BRIGHTNESS = [b,...] 0..1\n" +
                    "window.FACE_POINTS = new Float32Array([" + rp.join(",") + "]);\n" +
                    "window.FACE_BRIGHTNESS = new Float32Array([" + rb.join(",") + "]);\n";
                const blob = new Blob([js], { type: "text/javascript" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "face-points.js";
                a.click();
                URL.revokeObjectURL(a.href);
            });
        })();
    </script>
</body>

</html>
