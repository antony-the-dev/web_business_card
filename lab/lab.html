<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lab v2 — cube ↔ face morph</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", -apple-system, sans-serif;
            background: #0a2540;
            color: #e8ecf1;
            display: flex;
            min-height: 100vh;
        }

        #panel {
            width: 330px;
            padding: 1.5rem;
            background: #071a30;
            overflow-y: auto;
            flex-shrink: 0;
        }

        h1 { font-size: 1rem; letter-spacing: 0.08em; margin-bottom: 1rem; color: #14b8c4; }

        h2 { font-size: 0.72rem; letter-spacing: 0.1em; color: #5c7186; margin: 1.2rem 0 0.6rem; }

        .row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; }

        button {
            flex: 1;
            padding: 0.55rem;
            background: transparent;
            border: 1px solid #14b8c4;
            border-radius: 6px;
            color: #14b8c4;
            font-size: 0.78rem;
            cursor: pointer;
        }

        button:hover { background: rgba(20, 184, 196, 0.12); }

        button.on { background: #14b8c4; color: #071a30; font-weight: 600; }

        .ctl { margin-bottom: 0.85rem; }

        .ctl label {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: #9fb3c8;
            margin-bottom: 0.25rem;
        }

        .ctl label output { color: #14b8c4; font-variant-numeric: tabular-nums; }

        .ctl input { width: 100%; accent-color: #14b8c4; }

        textarea {
            width: 100%;
            height: 150px;
            background: #0a2540;
            color: #9fb3c8;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.65rem;
            padding: 0.5rem;
        }

        #stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        #frame {
            background: #dbe7fb;
            border-radius: 10px;
            overflow: hidden;
            width: min(900px, 100%);
            height: 70vh;
            position: relative;
            transition: width 0.3s ease;
        }

        #frame.mobile { width: 380px; }

        #frame canvas { display: block; width: 100%; height: 100%; }

        .note { font-size: 0.68rem; color: #5c7186; line-height: 1.5; margin-top: 0.4rem; }
    </style>
</head>

<body>
    <div id="panel">
        <h1>MORPH LAB v2</h1>

        <h2>VIEWPORT</h2>
        <div class="row">
            <button id="vp-desktop" class="on">Desktop</button>
            <button id="vp-mobile">Mobile</button>
        </div>

        <h2>ACTION</h2>
        <div class="row">
            <button id="btn-morph">Morph ⇄</button>
            <button id="btn-cycle">Auto cycle</button>
        </div>

        <h2>CUBE — <span id="lbl-cube">desktop</span></h2>
        <div class="ctl"><label>Scale <output id="o-cScale"></output></label>
            <input type="range" id="cScale" min="0.4" max="3" step="0.05"></div>
        <div class="ctl"><label>Grid density <output id="o-cGrid"></output></label>
            <input type="range" id="cGrid" min="3" max="9" step="1"></div>
        <div class="ctl"><label>Line opacity <output id="o-cLine"></output></label>
            <input type="range" id="cLine" min="0" max="0.6" step="0.02"></div>
        <div class="ctl"><label>Rotation speed <output id="o-cRot"></output></label>
            <input type="range" id="cRot" min="0" max="0.01" step="0.0005"></div>
        <div class="ctl"><label>Breathe amplitude <output id="o-cBreathe"></output></label>
            <input type="range" id="cBreathe" min="0" max="0.12" step="0.005"></div>

        <h2>FACE — <span id="lbl-face">desktop</span></h2>
        <div class="ctl"><label>Scale <output id="o-fScale"></output></label>
            <input type="range" id="fScale" min="0.4" max="3" step="0.05"></div>
        <div class="ctl"><label>Camera Z <output id="o-fCamZ"></output></label>
            <input type="range" id="fCamZ" min="1.5" max="6" step="0.1"></div>
        <div class="ctl"><label>Dot size <output id="o-fDot"></output></label>
            <input type="range" id="fDot" min="0.02" max="0.12" step="0.005"></div>
        <div class="ctl"><label>Shading contrast <output id="o-fShade"></output></label>
            <input type="range" id="fShade" min="0" max="1" step="0.05"></div>
        <div class="ctl"><label>Flatten face <output id="o-fFlat"></output></label>
            <input type="range" id="fFlat" min="0" max="1" step="0.05"></div>

        <h2>MORPH (shared)</h2>
        <div class="ctl"><label>Duration ms <output id="o-mDur"></output></label>
            <input type="range" id="mDur" min="400" max="4000" step="100"></div>
        <div class="ctl"><label>Position stagger <output id="o-mStag"></output></label>
            <input type="range" id="mStag" min="0" max="0.9" step="0.05"></div>
        <div class="ctl"><label>Brightness reveal <output id="o-mRev"></output></label>
            <input type="range" id="mRev" min="0" max="0.9" step="0.05"></div>
        <div class="ctl"><label>Hold face ms <output id="o-mHold"></output></label>
            <input type="range" id="mHold" min="1000" max="10000" step="500"></div>

        <h2>EXPORT</h2>
        <textarea id="cfg" readonly></textarea>
        <p class="note">Brightness reveal = the "developing photo" effect: highlights land first, shadows fill in
            last. Set it to 0 to compare.</p>
        <p class="note" id="src-note"></p>
    </div>

    <div id="stage">
        <div id="frame"><canvas id="cv"></canvas></div>
    </div>

    <!-- generated by facegen v2; keep next to this file. Lab falls back to a sphere without it. -->
    <script src="face-points.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        (function () {
            // ---------- config: 4 profiles + shared morph timing ----------
            const CFG = {
                cube: {
                    desktop: { scale: 1.1, grid: 5, lineOpacity: 0.25, rot: 0.002, breathe: 0.04 },
                    mobile: { scale: 1.7, grid: 5, lineOpacity: 0.25, rot: 0.002, breathe: 0.04 }
                },
                face: {
                    desktop: { scale: 1.1, camZ: 3.0, dotSize: 0.05, shade: 0.7, flatten: 0.85 },
                    mobile: { scale: 1.6, camZ: 3.0, dotSize: 0.06, shade: 0.7, flatten: 0.85 }
                },
                morph: { durationMs: 1600, stagger: 0.5, reveal: 0.6, holdMs: 4000 }
            };

            const INK = new THREE.Color(0x0a2540);
            const BG = new THREE.Color(0xdbe7fb);
            let vp = "desktop";
            let cycling = false;

            // ---------- face target: generated file or fallback sphere ----------
            let facePts, faceBright;
            const srcNote = document.getElementById("src-note");
            if (window.FACE_POINTS && window.FACE_POINTS.length) {
                facePts = window.FACE_POINTS;
                if (window.FACE_BRIGHTNESS && window.FACE_BRIGHTNESS.length * 3 === facePts.length) {
                    faceBright = window.FACE_BRIGHTNESS;
                    srcNote.textContent = "face-points.js v2 loaded: " + faceBright.length + " points with brightness.";
                } else {
                    // v1 file: recover brightness from the z relief (z was (b-0.5)*depth)
                    const n = facePts.length / 3;
                    faceBright = new Float32Array(n);
                    let zMin = Infinity, zMax = -Infinity;
                    for (let i = 0; i < n; i++) {
                        const z = facePts[i * 3 + 2];
                        if (z < zMin) zMin = z;
                        if (z > zMax) zMax = z;
                    }
                    const span = (zMax - zMin) || 1;
                    for (let i = 0; i < n; i++) faceBright[i] = (facePts[i * 3 + 2] - zMin) / span;
                    srcNote.textContent = "v1 points file — brightness recovered from depth. Re-export with facegen v2 for accuracy.";
                }
            } else {
                const n = 3200, arr = new Float32Array(n * 3), br = new Float32Array(n);
                for (let i = 0; i < n; i++) {
                    const t = Math.acos(2 * Math.random() - 1), p = Math.random() * Math.PI * 2;
                    arr[i * 3] = Math.sin(t) * Math.cos(p) * 1.1;
                    arr[i * 3 + 1] = Math.cos(t) * 1.1;
                    arr[i * 3 + 2] = Math.sin(t) * Math.sin(p) * 0.4;
                    br[i] = Math.random();
                }
                facePts = arr; faceBright = br;
                srcNote.textContent = "face-points.js not found — using a sphere placeholder.";
            }
            const N = facePts.length / 3;
            const HALF = 1.1;

            // ---------- structured cube: surface lattice nodes + wireframe edges.
            // Every face point gets a lattice node as its cube home; several points
            // stack on one node, so the resting cube reads as a clean dotted lattice
            // and the morph is still a true per-point flight. ----------
            let cubeHomes = new Float32Array(N * 3);
            let lineSeg = null;

            function buildCube(G) {
                const nodes = [];
                for (let i = 0; i <= G; i++) for (let j = 0; j <= G; j++) for (let k = 0; k <= G; k++) {
                    if (i === 0 || i === G || j === 0 || j === G || k === 0 || k === G) {
                        nodes.push([
                            -HALF + 2 * HALF * i / G,
                            -HALF + 2 * HALF * j / G,
                            -HALF + 2 * HALF * k / G
                        ]);
                    }
                }
                // homes: round-robin over shuffled nodes -> even dot coverage on the cube
                const order = nodes.map((_, i) => i);
                for (let i = order.length - 1; i > 0; i--) {
                    const j = (Math.random() * (i + 1)) | 0;
                    [order[i], order[j]] = [order[j], order[i]];
                }
                for (let p = 0; p < N; p++) {
                    const nd = nodes[order[p % order.length]];
                    cubeHomes[p * 3] = nd[0];
                    cubeHomes[p * 3 + 1] = nd[1];
                    cubeHomes[p * 3 + 2] = nd[2];
                }
                // wireframe: grid lines on each of the 6 faces
                const segs = [];
                const step = 2 * HALF / G;
                for (let a = 0; a <= G; a++) {
                    const u = -HALF + a * step;
                    for (const s of [-HALF, HALF]) {
                        segs.push(u, -HALF, s, u, HALF, s);   // z-faces vertical
                        segs.push(-HALF, u, s, HALF, u, s);   // z-faces horizontal
                        segs.push(u, s, -HALF, u, s, HALF);   // y-faces
                        segs.push(s, u, -HALF, s, u, HALF);   // x-faces
                    }
                }
                if (lineSeg) { figure.remove(lineSeg); lineSeg.geometry.dispose(); lineSeg.material.dispose(); }
                const lgeo = new THREE.BufferGeometry();
                lgeo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(segs), 3));
                const lmat = new THREE.LineBasicMaterial({ color: INK, transparent: true, opacity: 0.25 });
                lineSeg = new THREE.LineSegments(lgeo, lmat);
                figure.add(lineSeg);
            }

            // per-point random delay for the position wave
            const delay = new Float32Array(N);
            for (let i = 0; i < N; i++) delay[i] = Math.random();

            // ---------- three.js scene ----------
            const frame = document.getElementById("frame");
            const canvas = document.getElementById("cv");
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);

            function makeCircleTexture() {
                const c = document.createElement("canvas");
                c.width = c.height = 64;
                const x = c.getContext("2d");
                x.beginPath(); x.arc(32, 32, 28, 0, Math.PI * 2);
                x.fillStyle = "#fff"; x.fill();
                return new THREE.CanvasTexture(c);
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute("position", new THREE.BufferAttribute(new Float32Array(N * 3), 3));
            geo.setAttribute("color", new THREE.BufferAttribute(new Float32Array(N * 3), 3));
            const mat = new THREE.PointsMaterial({
                size: 0.05, map: makeCircleTexture(), vertexColors: true,
                transparent: true, depthWrite: false
            });
            const dots = new THREE.Points(geo, mat);
            const figure = new THREE.Group();
            figure.add(dots);
            scene.add(figure);
            buildCube(CFG.cube[vp].grid);

            let lastW = 0, lastH = 0;
            function resize() {
                const w = frame.clientWidth, h = frame.clientHeight;
                lastW = w; lastH = h;
                renderer.setSize(w, h, false);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
            }
            window.addEventListener("resize", resize);

            // ---------- morph state ----------
            let morph = 0, morphTarget = 0, holdTimer = null;

            function toggleMorph() {
                morphTarget = morphTarget === 0 ? 1 : 0;
                clearTimeout(holdTimer);
                if (morphTarget === 1 && cycling) {
                    holdTimer = setTimeout(() => { morphTarget = 0; }, CFG.morph.holdMs);
                }
            }

            const easeInOut = p => (p < 0.5 ? 4 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2);
            const clamp01 = v => (v < 0 ? 0 : v > 1 ? 1 : v);

            // ---------- animation ----------
            let t = 0, angle = 0, cycleTimer = null;
            const pos = geo.attributes.position;
            const col = geo.attributes.color;
            const tmp = new THREE.Color();

            function animate() {
                requestAnimationFrame(animate);
                // self-heal: the frame animates its width on viewport switch,
                // so re-fit the canvas whenever the frame size changes
                if (frame.clientWidth !== lastW || frame.clientHeight !== lastH) resize();
                const cube = CFG.cube[vp], face = CFG.face[vp], M = CFG.morph;

                const step = 16.7 / M.durationMs;
                if (morph < morphTarget) morph = Math.min(morph + step, 1);
                else if (morph > morphTarget) morph = Math.max(morph - step, 0);

                t += 0.01;
                angle += cube.rot * (1 - morph);

                const breathe = 1 + Math.sin(t * 1.4) * cube.breathe * (1 - morph);
                const scl = (cube.scale + (face.scale - cube.scale) * easeInOut(morph)) * breathe;
                figure.scale.setScalar(scl);

                // wireframe dissolves as the face forms
                lineSeg.material.opacity = cube.lineOpacity * (1 - easeInOut(morph));

                mat.size = face.dotSize;

                const stag = M.stagger, rev = M.reveal, shade = face.shade;
                // depth relief collapses as the face settles: 3D volume during the
                // flight, near-flat portrait at rest (flat = crisp, like the preview)
                const zK = 1 - face.flatten * easeInOut(morph);
                for (let i = 0; i < N; i++) {
                    // position: per-point staggered flight cube -> face
                    const lp = easeInOut(clamp01((morph - delay[i] * stag) / (1 - stag || 1)));
                    const j = i * 3;
                    pos.array[j] = cubeHomes[j] + (facePts[j] - cubeHomes[j]) * lp;
                    pos.array[j + 1] = cubeHomes[j + 1] + (facePts[j + 1] - cubeHomes[j + 1]) * lp;
                    pos.array[j + 2] = cubeHomes[j + 2] + (facePts[j + 2] * zK - cubeHomes[j + 2]) * lp;

                    // color: brightness-ordered reveal ("developing photo") —
                    // bright pixels commit to their face shade first, shadows last
                    const b = faceBright[i];
                    const lr = clamp01((morph - (1 - b) * rev) / (1 - rev || 1));
                    // face shade: bright -> full ink, dark -> sinks toward the background
                    const k = 1 - shade * (1 - b);
                    tmp.copy(BG).lerp(INK, k);
                    // blend from uniform cube ink to the shaded face color
                    col.array[j] = INK.r + (tmp.r - INK.r) * lr;
                    col.array[j + 1] = INK.g + (tmp.g - INK.g) * lr;
                    col.array[j + 2] = INK.b + (tmp.b - INK.b) * lr;
                }
                pos.needsUpdate = true;
                col.needsUpdate = true;

                const m = easeInOut(morph), inv = 1 - m;
                // orbit radius follows cube size so the camera never ends up inside
                const camR = Math.max(3.0, HALF * cube.scale * 2.4);
                camera.position.x = Math.sin(angle) * camR * inv;
                camera.position.y = Math.sin(angle * 0.5) * 0.5 * inv;
                camera.position.z = Math.cos(angle) * camR * inv + face.camZ * m;
                camera.lookAt(scene.position);

                renderer.render(scene, camera);
            }

            // ---------- UI wiring ----------
            const sliders = {
                cScale: [() => CFG.cube[vp].scale, v => CFG.cube[vp].scale = v],
                cGrid: [() => CFG.cube[vp].grid, v => { CFG.cube[vp].grid = v; buildCube(v); }],
                cLine: [() => CFG.cube[vp].lineOpacity, v => CFG.cube[vp].lineOpacity = v],
                cRot: [() => CFG.cube[vp].rot, v => CFG.cube[vp].rot = v],
                cBreathe: [() => CFG.cube[vp].breathe, v => CFG.cube[vp].breathe = v],
                fScale: [() => CFG.face[vp].scale, v => CFG.face[vp].scale = v],
                fCamZ: [() => CFG.face[vp].camZ, v => CFG.face[vp].camZ = v],
                fDot: [() => CFG.face[vp].dotSize, v => CFG.face[vp].dotSize = v],
                fShade: [() => CFG.face[vp].shade, v => CFG.face[vp].shade = v],
                fFlat: [() => CFG.face[vp].flatten, v => CFG.face[vp].flatten = v],
                mDur: [() => CFG.morph.durationMs, v => CFG.morph.durationMs = v],
                mStag: [() => CFG.morph.stagger, v => CFG.morph.stagger = v],
                mRev: [() => CFG.morph.reveal, v => CFG.morph.reveal = v],
                mHold: [() => CFG.morph.holdMs, v => CFG.morph.holdMs = v]
            };

            function syncSliders() {
                for (const id in sliders) {
                    const el = document.getElementById(id);
                    el.value = sliders[id][0]();
                    document.getElementById("o-" + id).textContent = el.value;
                }
                document.getElementById("lbl-cube").textContent = vp;
                document.getElementById("lbl-face").textContent = vp;
                document.getElementById("cfg").value = JSON.stringify(CFG, null, 2);
            }

            for (const id in sliders) {
                document.getElementById(id).addEventListener("input", (e) => {
                    sliders[id][1](+e.target.value);
                    document.getElementById("o-" + id).textContent = e.target.value;
                    document.getElementById("cfg").value = JSON.stringify(CFG, null, 2);
                });
            }

            function setViewport(v) {
                vp = v;
                document.getElementById("vp-desktop").classList.toggle("on", v === "desktop");
                document.getElementById("vp-mobile").classList.toggle("on", v === "mobile");
                frame.classList.toggle("mobile", v === "mobile");
                buildCube(CFG.cube[v].grid);
                syncSliders();
                requestAnimationFrame(resize);
            }

            document.getElementById("vp-desktop").addEventListener("click", () => setViewport("desktop"));
            document.getElementById("vp-mobile").addEventListener("click", () => setViewport("mobile"));
            document.getElementById("btn-morph").addEventListener("click", toggleMorph);
            document.getElementById("btn-cycle").addEventListener("click", (e) => {
                cycling = !cycling;
                e.target.classList.toggle("on", cycling);
                clearInterval(cycleTimer);
                if (cycling) {
                    toggleMorph();
                    cycleTimer = setInterval(() => { toggleMorph(); }, CFG.morph.holdMs + CFG.morph.durationMs + 800);
                }
            });
            canvas.addEventListener("click", toggleMorph);

            setViewport("desktop");
            resize();
            animate();
        })();
    </script>
</body>

</html>
